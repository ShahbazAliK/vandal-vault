<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vandal Vault</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            border: 1px solid #30363d;
            padding: 2rem;
            border-radius: 8px;
            background-color: #161b22;
        }
        h1 { color: #58a6ff; margin-bottom: 0.5rem; }
        p { color: #8b949e; }
        .status-tag {
            display: inline-block;
            background-color: #238636;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vandal Vault Live</h1>
        <p>Azure Static Web App Handshake: <strong>Success</strong></p>
        <div class="status-tag">System Optimized</div>
    </div>
</body>
</html>
